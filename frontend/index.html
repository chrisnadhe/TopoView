<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NetViz — Network Topology Visualizer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          brand: {
            50: '#f0f9ff',
            100: '#e0f2fe',
            400: '#38bdf8',
            500: '#0ea5e9',
            600: '#0284c7',
            900: '#0c4a6e',
          }
        }
      }
    }
  }
</script>
<style type="text/tailwindcss">
  @layer utilities {
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Specific overrides for the SVG elements */
    .node-label {
      font-size: 11px;
      fill: #475569; /* slate-600 */
      font-family: ui-sans-serif, system-ui, sans-serif;
      text-anchor: middle;
      pointer-events: none;
    }
    .dark .node-label {
      fill: #cbd5e1; /* slate-300 */
    }
    .link-line {
      stroke: #cbd5e1; /* slate-300 */
      stroke-width: 1.5;
      opacity: 0.6;
    }
    .dark .link-line {
      stroke: #475569; /* slate-600 */
    }
    .link-label {
      font-size: 9px;
      fill: #94a3b8; /* slate-400 */
      font-family: monospace;
      text-anchor: middle;
      pointer-events: none;
    }
    .dark .link-label {
      fill: #64748b; /* slate-500 */
    }
    .node-circle {
      transition: all 0.2s;
      cursor: pointer;
    }
    .node-circle:hover {
      filter: brightness(1.2);
      stroke-width: 3;
    }
    .node-circle.selected {
      stroke-width: 3;
      stroke: #0ea5e9; /* brand-500 */
      filter: drop-shadow(0 0 6px rgba(14, 165, 233, 0.5));
    }
  }
</style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 h-screen overflow-hidden antialiased font-sans flex transition-colors duration-300">

  <!-- Sidebar -->
  <aside class="w-80 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col h-full z-10 shadow-lg transition-colors duration-300 flex-shrink-0">
    <div class="p-5 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <svg width="28" height="28" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="3" fill="#38bdf8"/>
          <circle cx="3" cy="5" r="2" fill="#38bdf8" opacity=".7"/>
          <circle cx="19" cy="5" r="2" fill="#38bdf8" opacity=".7"/>
          <circle cx="3" cy="17" r="2" fill="#38bdf8" opacity=".7"/>
          <circle cx="19" cy="17" r="2" fill="#38bdf8" opacity=".7"/>
          <line x1="11" y1="11" x2="3" y2="5" stroke="#38bdf8" stroke-width="1" opacity=".5"/>
          <line x1="11" y1="11" x2="19" y2="5" stroke="#38bdf8" stroke-width="1" opacity=".5"/>
          <line x1="11" y1="11" x2="3" y2="17" stroke="#38bdf8" stroke-width="1" opacity=".5"/>
          <line x1="11" y1="11" x2="19" y2="17" stroke="#38bdf8" stroke-width="1" opacity=".5"/>
        </svg>
        <span class="font-bold text-xl tracking-tight text-slate-900 dark:text-white">NetViz</span>
      </div>
      <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-500 dark:text-slate-400">
        <!-- Sun icon -->
        <svg id="sunIcon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <!-- Moon icon -->
        <svg id="moonIcon" class="block w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto scrollbar-hide p-5 space-y-8">
      
      <!-- Upload Section -->
      <section>
        <h2 class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">Upload Configs</h2>
        
        <div id="uploadZone" class="border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:border-brand-400 dark:hover:border-brand-500 transition-all group relative">
          <svg class="w-8 h-8 text-slate-400 group-hover:text-brand-500 mb-2 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span class="text-sm font-medium text-slate-600 dark:text-slate-300">Drop config files here</span>
          <span class="text-xs text-slate-400 dark:text-slate-500 mt-1">Cisco IOS / Juniper JunOS</span>
          <input type="file" id="fileInput" multiple accept=".txt,.cfg,.conf,.log" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
        </div>
        
        <div id="fileList" class="mt-3 flex flex-col gap-2"></div>
        
        <div class="mt-4 flex flex-col gap-2">
          <button id="parseBtn" disabled class="w-full py-2.5 px-4 bg-brand-500 hover:bg-brand-600 disabled:bg-slate-200 disabled:dark:bg-slate-800 disabled:text-slate-400 disabled:cursor-not-allowed text-white font-medium rounded-lg shadow-sm hover:shadow transition-all focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
            Visualize Topology
          </button>
          <button id="demoBtn" class="w-full py-2.5 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-medium rounded-lg shadow-sm transition-all">
            Load Demo Network
          </button>
        </div>
      </section>

      <!-- Stats Section -->
      <section id="statsSection" class="hidden">
        <h2 class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">Topology Stats</h2>
        <div class="grid grid-cols-3 gap-2">
          <div class="bg-slate-100 dark:bg-slate-700/50 rounded-lg p-3 text-center">
            <div id="statDevices" class="text-xl font-bold text-slate-800 dark:text-slate-100">0</div>
            <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">Devices</div>
          </div>
          <div class="bg-slate-100 dark:bg-slate-700/50 rounded-lg p-3 text-center">
            <div id="statLinks" class="text-xl font-bold text-slate-800 dark:text-slate-100">0</div>
            <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">Links</div>
          </div>
          <div class="bg-slate-100 dark:bg-slate-700/50 rounded-lg p-3 text-center">
            <div id="statSubnets" class="text-xl font-bold text-slate-800 dark:text-slate-100">0</div>
            <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">Subnets</div>
          </div>
        </div>
      </section>

      <!-- Legend Section -->
      <section id="legendSection" class="hidden">
        <h2 class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">Legend</h2>
        <div class="flex flex-wrap gap-3 text-sm">
          <div class="flex items-center gap-2 text-slate-600 dark:text-slate-300"><span class="w-3 h-3 rounded-full bg-[#4fc3f7]"></span>Router</div>
          <div class="flex items-center gap-2 text-slate-600 dark:text-slate-300"><span class="w-3 h-3 rounded-full bg-[#f97316]"></span>Firewall</div>
          <div class="flex items-center gap-2 text-slate-600 dark:text-slate-300"><span class="w-3 h-3 rounded-sm bg-[#a78bfa]"></span>Switch</div>
          <div class="flex items-center gap-2 text-slate-600 dark:text-slate-300"><span class="w-3 h-3 rounded-full bg-[#6e7681]"></span>Unknown</div>
        </div>
      </section>

      <!-- Device Detail Section -->
      <section id="devicePanel" class="hidden mt-auto border-t border-slate-200 dark:border-slate-700 pt-5">
        <h2 class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">Device Detail</h2>
        <div id="deviceDetail" class="text-sm"></div>
      </section>

    </div>
  </aside>

  <!-- Main Canvas -->
  <main class="flex-1 relative bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    
    <!-- Toolbar -->
    <div id="toolbar" class="hidden absolute top-4 right-4 z-10 flex flex-col gap-2 bg-white dark:bg-slate-800 p-1.5 rounded-lg shadow-md border border-slate-200 dark:border-slate-700">
      <button id="btnZoomIn" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors" title="Zoom In">＋</button>
      <button id="btnZoomOut" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors" title="Zoom Out">－</button>
      <button id="btnFit" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors" title="Fit to Screen">⊡</button>
      <div class="w-6 h-px bg-slate-200 dark:bg-slate-700 mx-auto my-1"></div>
      <button id="btnExport" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-bold transition-colors" title="Export SVG">↓</button>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
      <div class="bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm p-8 rounded-2xl border border-slate-200/50 dark:border-slate-700/50 shadow-xl text-center max-w-md">
        <svg class="w-16 h-16 mx-auto text-brand-400 mb-4 opacity-80" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="8" width="20" height="14" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="36" y="8" width="20" height="14" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="22" y="42" width="20" height="14" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <line x1="18" y1="22" x2="32" y2="42" stroke="currentColor" stroke-width="1.5" opacity=".5"/>
          <line x1="46" y1="22" x2="32" y2="42" stroke="currentColor" stroke-width="1.5" opacity=".5"/>
          <line x1="28" y1="22" x2="46" y2="22" stroke="currentColor" stroke-width="1" opacity=".3" stroke-dasharray="3,3"/>
        </svg>
        <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-2">Ready to Visualize</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400">Upload config files from the sidebar to generate an interactive network topology map.</p>
      </div>
    </div>

    <svg id="topology" class="w-full h-full cursor-grab active:cursor-grabbing hidden"></svg>

    <div id="tooltip" class="absolute hidden bg-slate-800/95 text-slate-100 text-xs px-3 py-2 rounded-lg shadow-xl pointer-events-none z-50 border border-slate-700 backdrop-blur-md"></div>
  </main>

  <script>
    // Theme toggle logic
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const html = document.documentElement;

    function updateThemeUI() {
      if (html.classList.contains('dark')) {
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      } else {
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      }
    }

    themeToggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      if (html.classList.contains('dark')) {
        localStorage.theme = 'dark';
      } else {
        localStorage.theme = 'light';
      }
      updateThemeUI();
    });

    // Check preference
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
    } else {
      html.classList.remove('dark');
    }
    updateThemeUI();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="/static/js/topology.js"></script>
</body>
</html>
